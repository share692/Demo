<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> 
            đây là một phần quà bí mật mà anh tặng em
        </title>
        <style>
            body {
                background: linear-gradient(135deg, #ffd6e7, #ffb3d1, #ffc8e8, #ffe4f0, #f9c6d8);
                background-size: 400% 400%;
                animation: gradShift 10s ease infinite;
            }
            @keyframes gradShift {
                0%   { background-position: 0% 50%; }
                50%  { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }

            .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
            .heart {
                position: absolute;
                animation: floatUp linear infinite;
                opacity: 0;
            }
            @keyframes floatUp {
                0%   { transform: translateY(100vh); opacity: 0; }
                10%  { opacity: 0.7; }
                90%  { opacity: 0.5; }
                100% { transform: translateY(-10vh); opacity: 0; }
            }

            .content { position: relative; z-index: 1; text-align: center; }

            img {
                width: 180px;
                animation: giftBounce 2.4s ease-in-out infinite;
            }
            @keyframes giftBounce {
                0%, 100% { transform: translateY(0); }
                50%       { transform: translateY(-10px); }
            }

            .btn-open {
                display: inline-block;
                margin-top: 16px;
                padding: 12px 36px;
                background: linear-gradient(135deg, #f472b6, #e73c7e);
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 1rem;
                cursor: pointer;
                box-shadow: 0 6px 24px rgba(231,60,126,0.35);
            }
            .btn-open:hover { opacity: 0.88; }

            .letter-overlay {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 100;
                background: rgba(255,200,225,0.3);
                backdrop-filter: blur(6px);
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .letter-overlay.show { display: flex; }

            .letter-card {
                background: #fff8fb;
                border-radius: 24px;
                padding: 40px 36px;
                max-width: 520px;
                width: 100%;
                max-height: 88vh;
                overflow-y: auto;
                box-shadow: 0 12px 60px rgba(233,82,130,0.22);
            }
            .btn-close {
                margin-top: 20px;
                display: block;
                width: 100%;
                padding: 12px;
                background: linear-gradient(135deg, #f9a8d4, #f472b6);
                border: none;
                border-radius: 50px;
                color: #fff;
                font-size: 0.95rem;
                cursor: pointer;
            }
        </style>
    </head>

        <!-- Letter overlay -->
        <div class="letter-overlay" id="letterOverlay">
            <div class="letter-card">

                <button class="btn-close" onclick="closeLetter()">🎀 Đóng lại</button>
            </div>
        </div>

        <script>
            const emojis = ['💕','🩷','💗','💖','✨','🌸','💝','🎀'];
            const container = document.getElementById('hearts');
            for (let i = 0; i < 22; i++) {
                const el = document.createElement('div');
                el.className = 'heart';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
                el.style.animationDuration = (6 + Math.random() * 10) + 's';
                el.style.animationDelay = (Math.random() * 12) + 's';
                container.appendChild(el);
            }

            function openLetter() {
                document.getElementById('letterOverlay').classList.add('show');
            }
            function closeLetter() {
                document.getElementById('letterOverlay').classList.remove('show');
            }
            document.getElementById('letterOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeLetter();
            });
        </script>
